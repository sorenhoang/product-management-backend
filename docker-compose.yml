version: "3.9"

services:

  postgres:
    image: postgres:16-alpine
    container_name: pm_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       product_db
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d product_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: pm_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass redispassword
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redispassword", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pm_api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT:               Production
      ASPNETCORE_URLS:                      http://+:8080
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=product_db;Username=postgres;Password=postgres"
      Redis__ConnectionString:              "redis:6379,password=redispassword"
      Cache__ProductListTtlSeconds:         "60"
      Cache__ProductDetailTtlSeconds:       "300"
      Cache__CategoryTreeTtlSeconds:        "600"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  postgres_data:
  redis_data:
