version: "3.9"

# Development overrides — committed as a convenience template.
# Copy to docker-compose.override.yml and customise for your local environment.

services:

  api:
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS:        "http://+:8080;https://+:8081"
    ports:
      - "8080:8080"
      - "8081:8081"

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pm_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL:    admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

  redis_commander:
    image: rediscommander/redis-commander:latest
    container_name: pm_redis_commander
    restart: unless-stopped
    environment:
      REDIS_HOSTS: "local:redis:6379:0:redispassword"
    ports:
      - "8082:8081"
    depends_on:
      - redis
